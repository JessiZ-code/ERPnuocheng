<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保健品食品OEM/ODM工厂ERP系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" height="30">
</a>
            <a class="navbar-brand" href="{{ url_for('index') }}">保健品OEM工厂ERP</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">仪表盘</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('materials') }}">物料管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('boms') }}">BOM配方</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('orders') }}">客户订单</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('workorders') }}">生产工单</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('inventory') }}">库存查询</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('cost') }}">成本核算</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
